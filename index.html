  <style>
    :root {
      --primary-from: #0f9b0f;
      --primary-to: #00b09b;
      --bg-dark: #06120b;
      --bg-card: rgba(15, 23, 23, 0.96);
      --border-subtle: rgba(148, 163, 184, 0.35);
    }

    body {
      background: radial-gradient(circle at top left, #052e16 0, #020617 55%, #020617 100%);
      color: #e5e7eb;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    /* Glass card */
    .glass {
      background: linear-gradient(135deg, rgba(15, 23, 23, 0.95), rgba(15, 23, 42, 0.92));
      border: 1px solid rgba(148, 163, 184, 0.35);
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(18px);
    }

    .btn-primary {
      background-image: linear-gradient(to right, var(--primary-from), var(--primary-to));
      color: #f9fafb;
      border-radius: 9999px;
      padding: 0.7rem 1.6rem;
      font-weight: 600;
      box-shadow: 0 14px 30px rgba(34, 197, 94, 0.35);
      transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
    }

    .btn-primary:hover {
      filter: brightness(1.08);
      transform: translateY(-1px);
      box-shadow: 0 20px 40px rgba(34, 197, 94, 0.45);
    }

    .btn-outline {
      border-radius: 9999px;
      border: 1px solid rgba(148, 163, 184, 0.5);
      padding: 0.6rem 1.4rem;
      color: #e5e7eb;
      font-weight: 500;
      transition: all 0.15s ease;
    }

    .btn-outline:hover {
      border-color: #22c55e;
      color: #bbf7d0;
      background: rgba(15, 23, 42, 0.8);
    }

    .nav-blur {
      backdrop-filter: blur(18px);
      background: radial-gradient(circle at top left, rgba(21, 128, 61, 0.35), rgba(15, 23, 42, 0.98));
      border-bottom: 1px solid rgba(148, 163, 184, 0.35);
    }

    .input-modern {
      background: rgba(15, 23, 42, 0.95);
      border-radius: 0.9rem;
      border: 1px solid rgba(148, 163, 184, 0.4);
      padding: 0.65rem 0.85rem;
      color: #e5e7eb;
      outline: none;
      width: 100%;
      font-size: 0.9rem;
      transition: border-color 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
    }

    .input-modern:focus {
      border-color: #22c55e;
      box-shadow: 0 0 0 1px rgba(34, 197, 94, 0.55);
      background: rgba(15, 23, 42, 1);
    }

    .tag-pill {
      border-radius: 9999px;
      padding: 0.18rem 0.6rem;
      font-size: 0.7rem;
      font-weight: 500;
    }

    .scroll-smooth {
      scroll-behavior: smooth;
    }

    /* Toast */
    .toast {
      min-width: 260px;
      max-width: 360px;
      border-radius: 0.9rem;
      padding: 0.65rem 0.9rem;
      font-size: 0.85rem;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.55);
      animation: slideIn 0.16s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(10px) translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateX(0) translateY(0);
      }
    }

    .fade-out {
      animation: fadeOut 0.2s ease-out forwards;
    }

    @keyframes fadeOut {
      to {
        opacity: 0;
        transform: translateX(6px) translateY(4px);
      }
    }

    /* Loading spinner */
    .spinner {
      border-radius: 9999px;
      border-width: 2px;
      border-style: solid;
      border-color: rgba(148, 163, 184, 0.5);
      border-top-color: #22c55e;
      width: 18px;
      height: 18px;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Crop card */
    .crop-card {
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease, background 0.15s ease;
      border-radius: 1.05rem;
      background: radial-gradient(circle at top left, rgba(22, 163, 74, 0.12), rgba(15, 23, 42, 0.98));
      border: 1px solid rgba(148, 163, 184, 0.5);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.55);
    }

    .crop-card:hover {
      transform: translateY(-3px);
      border-color: rgba(74, 222, 128, 0.9);
      box-shadow: 0 18px 45px rgba(22, 163, 74, 0.55);
      background: radial-gradient(circle at top left, rgba(22, 163, 74, 0.18), rgba(15, 23, 42, 0.98));
    }

    /* Responsive navigation */
    @media (max-width: 768px) {
      .nav-links {
        display: none;
      }
      .nav-links.open {
        display: flex;
      }
    }

    @media (min-width: 769px) {
      .mobile-nav {
        display: none !important;
      }
    }

    /* Custom scrollbar for cards area */
    .thin-scroll::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    .thin-scroll::-webkit-scrollbar-track {
      background: transparent;
    }

    .thin-scroll::-webkit-scrollbar-thumb {
      background: rgba(75, 85, 99, 0.9);
      border-radius: 999px;
    }
  </style>

        heroStatFarmers: "രജിസ്റ്റർ ചെയ്ത കർഷകർ",
        heroStatCrops: "സജീവ വിള ലിസ്റ്റുകൾ",
        heroStatVillages: "സ്ഥിരീകരിച്ച ഗ്രാമങ്ങൾ",
        loading: "ലോഡിംഗ്…",
        delete: "ഇല്ലാതാക്കുക",
        cropDeleted: "വിള ഇല്ലാതാക്കി.",
        priceLabel: "വില",
        qtyLabel: "അളവ്",
        qualityLabel: "ഗുണം",
        villageLabel: "ഗ്രാം",
        phoneHint: "നിങ്ങളുടെ ഫോൺ നമ്പർ വാങ്ങുന്നവരുമായി പങ്കിട്ടിരിക്കുന്നു. ശരിയാണെന്ന് ഉറപ്പാക്കുക.",
        sessionRestored: "വീണ്ടും സ്വാഗതം, നിങ്ങളുടെ സെഷൻ പുനഃസ്ഥാപിച്ചു.",
        role: "പങ്ക്",
        farmerCropsEmpty: "നിങ്ങൾ ഇതുവരെ വിളകൾ ചേർത്തിട്ടില്ല.",
        enterValidNumber: "അളവും വിലയും ശരിയായ സംഖ്യകൾ ആയി നൽകുക.",
        languageSaved: "ഭാഷ അപ്ഡേറ്റ് ചെയ്തു.",
      },
    };

    // Utility: get translation
    const getLang = () => localStorage.getItem(STORAGE_KEYS.LANGUAGE) || "en";
    const t = (key) => {
      const lang = getLang();
      const dict = TRANSLATIONS[lang] || TRANSLATIONS.en;
      return dict[key] || TRANSLATIONS.en[key] || key;
    };

    // Storage helpers
    const loadJSON = (key, fallback) => {
      try {
        const raw = localStorage.getItem(key);
        if (!raw) return fallback;
        return JSON.parse(raw);
      } catch {
        return fallback;
      }
    };

    const saveJSON = (key, value) => {
      localStorage.setItem(key, JSON.stringify(value));
    };

    const getUsers = () => loadJSON(STORAGE_KEYS.USERS, []);
    const setUsers = (users) => saveJSON(STORAGE_KEYS.USERS, users);

    const getSession = () => {
      try {
        const raw = sessionStorage.getItem(STORAGE_KEYS.SESSION);
        if (!raw) return null;
        return JSON.parse(raw);
      } catch {
        return null;
      }
    };
    const setSession = (session) => {
      if (!session) {
        sessionStorage.removeItem(STORAGE_KEYS.SESSION);
      } else {
        sessionStorage.setItem(STORAGE_KEYS.SESSION, JSON.stringify(session));
      }
    };

    const getCrops = () => loadJSON(STORAGE_KEYS.CROPS, []);
    const setCrops = (crops) => saveJSON(STORAGE_KEYS.CROPS, crops);

    const generateId = () => "id_" + Math.random().toString(36).slice(2) + Date.now().toString(36);

    // -----------------------
    // Toast Notification
    // -----------------------
    const showToast = (message, type = "info") => {
      let container = document.getElementById("toast-container");
      if (!container) {
        container = document.createElement("div");
        container.id = "toast-container";
        container.className = "fixed z-50 bottom-4 right-4 flex flex-col gap-2";
        document.body.appendChild(container);
      }
      const el = document.createElement("div");
      let colors = "bg-slate-900 border-slate-500 text-slate-100";
      if (type === "success") colors = "bg-emerald-900/90 border-emerald-500 text-emerald-50";
      if (type === "error") colors = "bg-red-900/90 border-red-500 text-red-50";
      if (type === "warning") colors = "bg-amber-900/90 border-amber-500 text-amber-50";
      el.className = `toast border ${colors} flex items-start gap-2`;
      const icon = document.createElement("span");
      icon.innerHTML = type === "error"
        ? '<i class="fa-solid fa-circle-xmark mt-0.5 text-red-300"></i>'
        : type === "success"
          ? '<i class="fa-solid fa-circle-check mt-0.5 text-emerald-300"></i>'
          : '<i class="fa-solid fa-circle-info mt-0.5 text-sky-300"></i>';
      const text = document.createElement("div");
      text.textContent = message;
      const close = document.createElement("button");
      close.innerHTML = '<i class="fa-solid fa-xmark"></i>';
      close.className = "ml-2 text-xs text-slate-200/70 hover:text-white";
      close.onclick = () => {
        el.classList.add("fade-out");
        setTimeout(() => el.remove(), 180);
      };
      el.appendChild(icon);
      el.appendChild(text);
      el.appendChild(close);
      container.appendChild(el);
      setTimeout(() => {
        if (el.parentNode) {
          el.classList.add("fade-out");
          setTimeout(() => el.remove(), 180);
        }
      }, 4200);
    };

    // -----------------------
    // App State & Rendering
    // -----------------------
    const AppState = {
      currentRoute: "home", // home | login_farmer | login_user | signup_farmer | signup_user | farmer_dashboard | marketplace
      auth: getSession(),
      loading: false,
      selectedLanguage: getLang(),
      filters: {
        search: "",
        village: "all",
        quality: "all",
      },
      initDone: false,
    };

    const setRoute = (route) => {
      AppState.currentRoute = route;
      renderApp();
      window.scrollTo({ top: 0, behavior: "smooth" });
    };

    const setLanguage = (lang) => {
      AppState.selectedLanguage = lang;
      localStorage.setItem(STORAGE_KEYS.LANGUAGE, lang);
      renderApp();
      showToast(t("languageSaved"), "success");
    };

    const updateAuth = (session) => {
      AppState.auth = session;
      setSession(session);
      renderApp();
    };

    const setLoading = (val) => {
      AppState.loading = val;
      const btns = document.querySelectorAll("[data-loading-btn]");
      btns.forEach((btn) => {
        if (val) {
          btn.setAttribute("disabled", "true");
          btn.classList.add("opacity-70", "cursor-wait");
        } else {
          btn.removeAttribute("disabled");
          btn.classList.remove("opacity-70", "cursor-wait");
        }
      });
    };

    const isFarmer = () => AppState.auth && AppState.auth.role === "farmer";

    // -----------------------
    // Auth Functions
    // -----------------------
    const signup = ({ role, name, email, phone, village, password, confirmPassword }) => {
      if (!name || !email || !phone || !village || !password || !confirmPassword) {
        showToast(t("requiredFields"), "warning");
        return;
      }
      if (password !== confirmPassword) {
        showToast(t("passwordMismatch"), "error");
        return;
      }
      const users = getUsers();
      if (users.some((u) => u.email === email && u.role === role)) {
        showToast(t("emailExists"), "error");
        return;
      }
      const userId = generateId();
      const newUser = { id: userId, role, name, email, phone, village, password };
      users.push(newUser);
      setUsers(users);
      showToast(t("signupSuccess"), "success");
      if (role === "farmer") setRoute("login_farmer");
      else setRoute("login_user");
    };

    const login = ({ role, email, password }) => {
      if (!email || !password) {
        showToast(t("requiredFields"), "warning");
        return;
      }
      const users = getUsers();
      const user = users.find((u) => u.email === email && u.role === role && u.password === password);
      if (!user) {
        showToast(t("invalidCredentials"), "error");
        return;
      }
      const session = {
        id: user.id,
        role: user.role,
        name: user.name,
        email: user.email,
        village: user.village,
        phone: user.phone,
      };
      updateAuth(session);
      showToast(t("loginSuccess"), "success");
      if (role === "farmer") setRoute("farmer_dashboard");
      else setRoute("marketplace");
    };

    const logout = () => {
      updateAuth(null);
      showToast(t("logoutSuccess"), "success");
      setRoute("home");
    };

    // -----------------------
    // Crop Handling
    // -----------------------
    const addCrop = ({ name, quantity, price, quality, description, village }) => {
      if (!name || !quantity || !price || !quality || !village) {
        showToast(t("requiredFields"), "warning");
        return false;
      }
      const qtyNum = Number(quantity);
      const priceNum = Number(price);
      if (Number.isNaN(qtyNum) || Number.isNaN(priceNum) || qtyNum <= 0 || priceNum <= 0) {
        showToast(t("enterValidNumber"), "error");
        return false;
      }
      if (!VILLAGES.includes(village)) {
        showToast(t("invalidVillage"), "error");
        return false;
      }
      const crops = getCrops();
      const newCrop = {
        id: generateId(),
        farmerId: AppState.auth.id,
        name,
        quantity: qtyNum,
        price: priceNum,
        quality,
        description,
        village,
        createdAt: Date.now(),
      };
      crops.push(newCrop);
      setCrops(crops);
      showToast(t("cropAdded"), "success");
      renderApp();
      return true;
    };

    const deleteCrop = (cropId) => {
      const crops = getCrops();
      const remaining = crops.filter((c) => c.id !== cropId || c.farmerId !== AppState.auth.id);
      setCrops(remaining);
      showToast(t("cropDeleted"), "success");
      renderApp();
    };

    // -----------------------
    // UI Components
    // -----------------------
    const renderNavbar = () => {
      const auth = AppState.auth;
      return `
      <header class="sticky top-0 z-30 nav-blur">

            <!-- Language selector -->
            <div class="hidden sm:flex items-center gap-1 mr-2 rounded-full border border-emerald-500/50 bg-slate-900/50 px-2.5 py-1">

                ${t("allCrops")}

            </div>

        <!-- Mobile menu -->
        <div id="mobile-nav" class="mobile-nav hidden border-t border-emerald-500/40 bg-slate-950/95">

                <select id="language-select-mobile"

                  ${Object.keys(TRANSLATIONS).map((code) => {

                      te: "తెలుగు",
                      hi: "हिन्दी",
                      ta: "தமிழ்",

              </div>
            </div>
            <div class="flex flex-col gap-2">
              <button data-nav="home" class="flex items-center justify-between px-2 py-1 rounded-lg text-slate-200 hover:bg-slate-800/70">
                <span>${t("home") || "Home"}</span>
                <i class="fa-solid fa-house text-xs text-emerald-300"></i>
              </button>
              <button data-nav="marketplace" class="flex items-center justify-between px-2 py-1 rounded-lg text-slate-200 hover:bg-slate-800/70">
                <span>${t("allCrops")}</span>

              </button>
              ${auth && auth.role === "farmer" ? `
              <button data-nav="farmer_dashboard" class="flex items-center justify-between px-2 py-1 rounded-lg text-slate-200 hover:bg-slate-800/70">
                <span>${t("farmerDashboard")}</span>

            <span>${t("trueVillageHint")}</span>

          <h1 class="text-3xl sm:text-4xl lg:text-5xl font-semibold tracking-tight text-slate-50 mb-4 leading-tight">

            ${t("heroSubtitle")}
          </p>

          <div class="flex flex-wrap items-center gap-3 mb-6">
            <button data-nav="signup_farmer" class="btn-primary flex items-center gap-2 text-sm" data-role="farmer">
              <i class="fa-solid fa-tractor"></i><span>${t("getStartedFarmer")}</span>

            <button data-nav="marketplace" class="btn-outline flex items-center gap-2 text-sm">

            <div class="glass rounded-2xl px-3 py-2.5 flex flex-col">
              <span class="text-emerald-300 text-xs mb-0.5 uppercase tracking-[.12em]">${t("heroStatCrops")}</span>

                    <i class="fa-solid fa-store"></i>
                  </span>
                  <span>${t("buyerView")}</span>
                </h2>
                <button data-nav="marketplace" class="text-[0.7rem] text-emerald-300 hover:text-emerald-100 flex items-center gap-1">

      </section>

    const renderCropCardsPreview = () => {
      const crops = getCrops().slice(-5).reverse();
      if (!crops.length) {
        return `<div class="text-xs text-slate-400 italic">${t("noCrops")}</div>`;
      }
      const users = getUsers();
      return crops.map((crop) => {
        const farmer = users.find((u) => u.id === crop.farmerId);
        return `
        <article class="crop-card px-3.5 py-3 flex justify-between items-start">
          <div>
            <h3 class="text-sm font-semibold text-slate-50 mb-0.5">${crop.name}</h3>
            <div class="flex flex-wrap gap-1 mb-1">
              <span class="tag-pill bg-emerald-500/20 text-emerald-200 border border-emerald-400/40">${t("qtyLabel")}: ${crop.quantity}</span>
              <span class="tag-pill bg-sky-500/15 text-sky-200 border border-sky-400/40">${t("priceLabel")}: ₹${crop.price}</span>
              <span class="tag-pill bg-amber-500/15 text-amber-200 border border-amber-400/45">${t("qualityLabel")}: ${crop.quality}</span>
            </div>
            <p class="text-[0.7rem] text-slate-300/85 line-clamp-2">${crop.description || ""}</p>
            <div class="mt-1 flex items-center gap-2 text-[0.7rem] text-slate-400">
              <i class="fa-solid fa-location-dot text-emerald-300"></i>
              <span>${crop.village}</span>
              ${farmer ? `<span class="mx-1 text-slate-600">·</span><span>${farmer.name}</span>` : ""}
            </div>
          </div>
          <div class="flex flex-col items-end gap-2">
            <button class="text-[0.65rem] text-emerald-300 border border-emerald-400/60 rounded-full px-2 py-0.5">
              ${t("contactFarmer")}
            </button>
            <span class="text-[0.65rem] text-slate-500">${new Date(crop.createdAt).toLocaleDateString()}</span>
          </div>
        </article>
        `;
      }).join("");
    };

    const renderLoginSignup = (mode, role) => {
      const isLogin = mode === "login";
      const isFarmerRole = role === "farmer";
      const title = isLogin
        ? isFarmerRole ? t("farmerLogin") : t("userLogin")
        : isFarmerRole ? t("farmerSignup") : t("userSignup");
      const altText = isLogin ? t("noAccount") : t("alreadyAccount");
      const altRoute = isLogin
        ? isFarmerRole ? "signup_farmer" : "signup_user"
        : isFarmerRole ? "login_farmer" : "login_user";

      return `
      <section class="max-w-md mx-auto px-4 sm:px-6 lg:px-8 py-10 sm:py-12">
        <div class="glass rounded-3xl p-5 sm:p-7">
          <div class="flex items-center justify-between mb-5">
            <div>
              <h1 class="text-xl sm:text-2xl font-semibold text-slate-50 mb-1">${title}</h1>
              <p class="text-xs text-slate-400 flex items-center gap-1">
                <i class="fa-solid fa-circle-info text-emerald-300"></i>
                <span>${isFarmerRole ? t("farmerDashboard") : t("buyerView")}</span>
              </p>
            </div>
            <div class="hidden sm:flex flex-col items-end text-[0.7rem] text-slate-400">
              <span class="uppercase tracking-[.16em] text-emerald-300 mb-1">${t("role")}</span>
              <span class="px-2 py-0.5 rounded-full border border-emerald-400/70 bg-emerald-900/40 text-emerald-100">
                ${isFarmerRole ? t("roleFarmer") : t("roleUser")}
              </span>
            </div>
          </div>

          <form id="${isLogin ? "login-form" : "signup-form"}" class="space-y-4">
            ${!isLogin ? `
            <div class="space-y-1.5">
              <label class="block text-xs text-slate-300">${t("name")}</label>
              <input name="name" type="text" class="input-modern" autocomplete="name" />
            </div>
            ` : ""}
            <div class="space-y-1.5">
              <label class="block text-xs text-slate-300">${t("email")}</label>
              <input name="email" type="email" class="input-modern" autocomplete="email" />
            </div>
            ${!isLogin ? `
            <div class="space-y-1.5">
              <label class="block text-xs text-slate-300">${t("phone")}</label>
              <input name="phone" type="tel" class="input-modern" autocomplete="tel" />
              <p class="text-[0.65rem] text-amber-300/80 mt-0.5 flex items-start gap-1">
                <i class="fa-solid fa-triangle-exclamation mt-[2px]"></i>
                <span>${t("phoneHint")}</span>
              </p>
            </div>
            <div class="space-y-1.5">
              <label class="block text-xs text-slate-300">${t("village")}</label>
              <select name="village" class="input-modern">
                <option value="">${t("village")}</option>
                ${VILLAGES.map((v) => `<option value="${v}">${v}</option>`).join("")}
              </select>
            </div>
            ` : ""}

            <div class="space-y-1.5">
              <label class="block text-xs text-slate-300">${t("password")}</label>
              <input name="password" type="password" class="input-modern" autocomplete="${isLogin ? "current-password" : "new-password"}" />
            </div>

            ${!isLogin ? `
            <div class="space-y-1.5">
              <label class="block text-xs text-slate-300">${t("confirmPassword")}</label>
              <input name="confirmPassword" type="password" class="input-modern" autocomplete="new-password" />
            </div>
            ` : ""}

            <div class="flex items-center justify-between pt-2">
              <button type="submit" data-loading-btn class="btn-primary text-sm flex items-center gap-2">
                ${isLogin ? `<i class="fa-solid fa-right-to-bracket"></i>` : `<i class="fa-solid fa-user-plus"></i>`}
                <span>${isLogin ? t("login") : t("signup")}</span>
              </button>
              <button type="button" data-nav="${altRoute}" class="text-[0.7rem] text-slate-300 hover:text-emerald-200">
                ${altText}
              </button>
            </div>
          </form>
        </div>
      </section>
      `;
    };

    const renderFarmerDashboard = () => {
      const auth = AppState.auth;
      const crops = getCrops().filter((c) => c.farmerId === auth.id);
      return `
      <section class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8 sm:py-10 lg:py-12 grid lg:grid-cols-[1.1fr,1.1fr] xl:grid-cols-[1.1fr,1.15fr] gap-6 lg:gap-8">
        <div class="glass rounded-3xl p-4 sm:p-5 lg:p-6 h-fit">
          <div class="flex items-center justify-between mb-4">
            <div>
              <h2 class="text-lg sm:text-xl font-semibold text-slate-50 mb-1 flex items-center gap-2">
                <i class="fa-solid fa-tractor text-emerald-300"></i>
                <span>${t("farmerDashboard")}</span>
              </h2>
              <p class="text-xs text-slate-400">${t("welcomeBack")} ${auth.name}</p>
            </div>
            <div class="hidden sm:flex flex-col items-end text-[0.7rem] text-slate-300">
              <span class="px-2 py-0.5 rounded-full border border-emerald-500/60 bg-slate-950/70">${auth.village}</span>
              <span class="mt-1">${auth.phone}</span>
            </div>
          </div>

          <form id="add-crop-form" class="space-y-3 mt-2">
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
              <div class="space-y-1">
                <label class="block text-xs text-slate-300">${t("cropName")}</label>
                <input name="name" type="text" class="input-modern" />
              </div>
              <div class="space-y-1">
                <label class="block text-xs text-slate-300">${t("quantity")}</label>
                <input name="quantity" type="number" step="0.01" class="input-modern" />
              </div>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
              <div class="space-y-1">
                <label class="block text-xs text-slate-300">${t("pricePerUnit")}</label>
                <input name="price" type="number" step="0.01" class="input-modern" />
              </div>
              <div class="space-y-1">
                <label class="block text-xs text-slate-300">${t("quality")}</label>
                <select name="quality" class="input-modern">
                  <option value="">${t("quality")}</option>
                  <option value="A+">A+</option>
                  <option value="A">A</option>
                  <option value="B">B</option>
                  <option value="C">C</option>
                </select>
              </div>
            </div>
            <div class="space-y-1">
              <label class="block text-xs text-slate-300">${t("village")}</label>
              <select name="village" class="input-modern">
                ${VILLAGES.map((v) => `<option value="${v}" ${auth.village === v ? "selected" : ""}>${v}</option>`).join("")}
              </select>
            </div>
            <div class="space-y-1">
              <label class="block text-xs text-slate-300">${t("description")}</label>
              <textarea name="description" rows="3" class="input-modern resize-none"></textarea>
            </div>
            <div class="flex items-center justify-between pt-2">
              <button type="submit" data-loading-btn class="btn-primary text-sm flex items-center gap-2">
                <i class="fa-solid fa-circle-plus"></i><span>${t("addCrop")}</span>
              </button>
              <span class="text-[0.7rem] text-slate-400 max-w-[190px] text-right hidden sm:block">
                ${t("trueVillageHint")}
              </span>
            </div>
          </form>
        </div>

        <div class="glass rounded-3xl p-4 sm:p-5 lg:p-6">
          <div class="flex items-center justify-between mb-3">
            <h2 class="text-sm sm:text-base font-semibold text-slate-50 flex items-center gap-2">
              <i class="fa-solid fa-wheat-awn text-emerald-300"></i>
              <span>${t("myCrops")}</span>
            </h2>
            <span class="text-[0.7rem] text-slate-400">${crops.length} ${t("allCrops").toLowerCase()}</span>
          </div>
          <div class="h-[280px] sm:h-[320px] overflow-y-auto thin-scroll space-y-3">
            ${
              crops.length
                ? crops.slice().reverse().map((crop) => `
              <article class="crop-card px-3.5 py-3 flex items-start justify-between">
                <div>
                  <h3 class="text-sm font-semibold text-slate-50 mb-0.5">${crop.name}</h3>
                  <div class="flex flex-wrap gap-1 mb-1">
                    <span class="tag-pill bg-emerald-500/20 text-emerald-200 border border-emerald-400/40">${t("qtyLabel")}: ${crop.quantity}</span>
                    <span class="tag-pill bg-sky-500/15 text-sky-200 border border-sky-400/40">${t("priceLabel")}: ₹${crop.price}</span>
                    <span class="tag-pill bg-amber-500/15 text-amber-200 border border-amber-400/45">${t("qualityLabel")}: ${crop.quality}</span>
                  </div>
                  <p class="text-[0.7rem] text-slate-300/85 line-clamp-2">${crop.description || ""}</p>
                  <div class="mt-1 flex items-center gap-2 text-[0.7rem] text-slate-400">
                    <i class="fa-solid fa-location-dot text-emerald-300"></i>
                    <span>${crop.village}</span>
                    <span class="mx-1 text-slate-600">·</span>
                    <span>${new Date(crop.createdAt).toLocaleDateString()}</span>
                  </div>
                </div>
                <button data-delete-crop="${crop.id}" class="text-[0.65rem] text-red-300 border border-red-500/70 rounded-full px-2 py-0.5 hover:bg-red-700/40">
                  <i class="fa-solid fa-trash-can mr-1"></i>${t("delete")}
                </button>
              </article>
              `).join("")
                : `<p class="text-xs text-slate-400 italic">${t("farmerCropsEmpty")}</p>`
            }
          </div>
        </div>
      </section>
      `;
    };

    const renderMarketplace = () => {
      const crops = getCrops();
      const users = getUsers();

      const filtered = crops.filter((crop) => {
        const { search, village, quality } = AppState.filters;
        let ok = true;
        if (search) {
          const s = search.toLowerCase();
          const farmer = users.find((u) => u.id === crop.farmerId);
          ok =
            crop.name.toLowerCase().includes(s) ||
            crop.village.toLowerCase().includes(s) ||
            (farmer && farmer.name.toLowerCase().includes(s));
        }
        if (ok && village !== "all") ok = crop.village === village;
        if (ok && quality !== "all") ok = crop.quality === quality;
        return ok;
      });

      return `
      <section class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8 sm:py-10 lg:py-12">
        <div class="flex flex-col sm:flex-row gap-4 sm:items-end sm:justify-between mb-5">
          <div>
            <h1 class="text-xl sm:text-2xl font-semibold text-slate-50 flex items-center gap-2 mb-1">
              <i class="fa-solid fa-store text-emerald-300"></i>
              <span>${t("allCrops")}</span>
            </h1>
            <p class="text-xs text-slate-400 max-w-md">${t("trueVillageHint")}</p>
          </div>
          <div class="glass rounded-2xl px-3 py-2 flex flex-wrap gap-2 items-center">
            <div class="flex items-center gap-2 flex-1 min-w-[160px]">
              <i class="fa-solid fa-magnifying-glass text-slate-400 text-xs"></i>
              <input id="filter-search" type="text" class="bg-transparent text-xs outline-none w-full text-slate-100 placeholder:text-slate-500" placeholder="${t("searchPlaceholder")}" value="${AppState.filters.search}" />
            </div>
            <div class="flex items-center gap-2 text-[0.7rem]">
              <select id="filter-village" class="bg-slate-900/80 border border-slate-600/70 text-slate-100 rounded-full px-2 py-1 text-[0.7rem] outline-none">
                <option value="all">${t("filterVillage")}: ${t("all")}</option>
                ${VILLAGES.map((v) => `<option value="${v}" ${AppState.filters.village === v ? "selected" : ""}>${v}</option>`).join("")}
              </select>
              <select id="filter-quality" class="bg-slate-900/80 border border-slate-600/70 text-slate-100 rounded-full px-2 py-1 text-[0.7rem] outline-none">
                <option value="all">${t("filterQuality")}: ${t("all")}</option>
                <option value="A+">A+</option>
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="C">C</option>
              </select>
            </div>
          </div>
        </div>

        <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-5">
          ${
            filtered.length
              ? filtered.slice().reverse().map((crop) => {
                const farmer = users.find((u) => u.id === crop.farmerId);
                return `
              <article class="crop-card p-3.5 flex flex-col justify-between">
                <div>
                  <div class="flex items-start justify-between gap-2 mb-1.5">
                    <div>
                      <h2 class="text-sm font-semibold text-slate-50 mb-0.5">${crop.name}</h2>
                      <p class="text-[0.7rem] text-slate-400 line-clamp-2">${crop.description || ""}</p>
                    </div>
                    <div class="text-right">
                      <p class="text-xs text-emerald-200 font-semibold">₹${crop.price}</p>
                      <p class="text-[0.65rem] text-slate-400">${t("qtyLabel")}: ${crop.quantity}</p>
                    </div>
                  </div>
                  <div class="flex flex-wrap gap-1 mb-1.5">
                    <span class="tag-pill bg-amber-500/15 text-amber-200 border border-amber-400/45">${t("qualityLabel")}: ${crop.quality}</span>
                    <span class="tag-pill bg-emerald-500/20 text-emerald-200 border border-emerald-400/40 flex items-center gap-1">
                      <i class="fa-solid fa-location-dot text-emerald-300"></i>${crop.village}
                    </span>
                  </div>
                </div>
                <div class="mt-2 pt-2 border-t border-slate-700/70 flex items-center justify-between gap-3">
                  ${
                    farmer
                      ? `
                  <div class="flex flex-col text-[0.7rem] text-slate-300">
                    <span class="font-medium flex items-center gap-1">
                      <i class="fa-solid fa-user text-emerald-300"></i>
                      <span>${t("farmerName")}: ${farmer.name}</span>
                    </span>
                    <span class="flex items-center gap-1 text-slate-400">
                      <i class="fa-solid fa-phone text-emerald-300"></i>
                      <span>${t("farmerPhone")}: ${farmer.phone}</span>
                    </span>
                    <span class="flex items-center gap-1 text-slate-500">
                      <i class="fa-solid fa-location-dot text-emerald-300"></i>
                      <span>${t("farmerVillage")}: ${farmer.village}</span>
                    </span>
                  </div>
                  `
                      : ""
                  }
                  <a href="tel:${farmer ? farmer.phone : ""}" class="btn-outline text-[0.7rem] whitespace-nowrap flex items-center gap-1 px-3 py-1">
                    <i class="fa-solid fa-phone-volume"></i>
                    <span>${t("contactFarmer")}</span>
                  </a>
                </div>
              </article>
              `;
              }).join("")
              : `<p class="text-sm text-slate-400 col-span-full">${t("noCrops")}</p>`
          }
        </div>
      </section>
      `;
    };

    const renderHome = () => `
      ${renderHero()}
    `;

    const renderMainContent = () => {
      switch (AppState.currentRoute) {
        case "login_farmer":
          return renderLoginSignup("login", "farmer");
        case "login_user":
          return renderLoginSignup("login", "user");
        case "signup_farmer":
          return renderLoginSignup("signup", "farmer");
        case "signup_user":
          return renderLoginSignup("signup", "user");
        case "farmer_dashboard":
          if (!AppState.auth || AppState.auth.role !== "farmer") {
            setRoute("login_farmer");
            return "";
          }
          return renderFarmerDashboard();
        case "marketplace":
          return renderMarketplace();
        case "home":
        default:
          return renderHome();
      }
    };

    const renderApp = () => {
      const root = document.getElementById("app-root");
      if (!root) return;
      root.innerHTML = `
        ${renderNavbar()}
        <main class="flex-1">
          ${renderMainContent()}
        </main>
        <footer class="mt-auto border-t border-slate-800/80 bg-slate-950/90">
          <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-3 flex flex-col sm:flex-row gap-2 sm:items-center sm:justify-between text-[0.7rem] text-slate-500">
            <div class="flex items-center gap-1">
              <i class="fa-solid fa-leaf text-emerald-400"></i>
              <span>&copy; ${new Date().getFullYear()} ${t("brand")}. ${t("tagline")}.</span>
            </div>
            <div class="flex flex-wrap gap-2">
              <span class="px-2 py-0.5 rounded-full border border-emerald-500/40 text-emerald-200 bg-slate-900/80">${VILLAGES.length} ${t("villageLabel") || "Villages"} ✓</span>
              <span class="px-2 py-0.5 rounded-full border border-slate-600/40 text-slate-300 bg-slate-900/80 flex items-center gap-1">
                <i class="fa-solid fa-signal text-emerald-300"></i>
                <span>100% Frontend · LocalStorage</span>
              </span>
            </div>
          </div>
        </footer>
      `;
      attachEventListeners();
    };

    // -----------------------
    // Event Listeners
    // -----------------------
    const attachEventListeners = () => {
      // Nav buttons
      document.querySelectorAll("[data-nav]").forEach((el) => {
        el.onclick = () => {
          const dest = el.getAttribute("data-nav");
          setRoute(dest);
          const mobileNav = document.getElementById("mobile-nav");
          if (mobileNav) mobileNav.classList.add("hidden");
        };
      });

      const logoutBtn = document.querySelector("[data-action='logout']");
      if (logoutBtn) logoutBtn.onclick = logout;

      // Language
      const langSelect = document.getElementById("language-select");
      if (langSelect) {
        langSelect.onchange = (e) => setLanguage(e.target.value);
      }
      const langSelectMobile = document.getElementById("language-select-mobile");
      if (langSelectMobile) {
        langSelectMobile.onchange = (e) => setLanguage(e.target.value);
      }

      // Mobile menu
      const mobileToggle = document.getElementById("mobile-menu-toggle");
      const mobileNav = document.getElementById("mobile-nav");
      if (mobileToggle && mobileNav) {
        mobileToggle.onclick = () => {
          mobileNav.classList.toggle("hidden");
        };
      }

      // Auth forms
      const loginForm = document.getElementById("login-form");
      if (loginForm) {
        loginForm.onsubmit = (e) => {
          e.preventDefault();
          const form = e.target;
          const email = form.email.value.trim();
          const password = form.password.value;
          const role = AppState.currentRoute === "login_farmer" ? "farmer" : "user";
          setLoading(true);
          setTimeout(() => {
            login({ role, email, password });
            setLoading(false);
          }, 300);
        };
      }
      const signupForm = document.getElementById("signup-form");
      if (signupForm) {
        signupForm.onsubmit = (e) => {
          e.preventDefault();
          const form = e.target;
          const role = AppState.currentRoute === "signup_farmer" ? "farmer" : "user";
          const data = {
            role,
            name: form.name.value.trim(),
            email: form.email.value.trim(),
            phone: form.phone.value.trim(),
            village: form.village.value,
            password: form.password.value,
            confirmPassword: form.confirmPassword.value,
          };
          setLoading(true);
          setTimeout(() => {
            signup(data);
            setLoading(false);
          }, 350);
        };
      }

      // Add crop form
      const addCropForm = document.getElementById("add-crop-form");
      if (addCropForm) {
        addCropForm.onsubmit = (e) => {
          e.preventDefault();
          const form = e.target;
          const ok = addCrop({
            name: form.name.value.trim(),
            quantity: form.quantity.value,
            price: form.price.value,
            quality: form.quality.value,
            description: form.description.value.trim(),
            village: form.village.value,
          });
          if (ok) form.reset();
        };
      }

      // Delete crop buttons
      document.querySelectorAll("[data-delete-crop]").forEach((btn) => {
        btn.onclick = () => {
          const id = btn.getAttribute("data-delete-crop");
          deleteCrop(id);
        };
      });

      // Filters on marketplace
      const searchInput = document.getElementById("filter-search");
      if (searchInput) {
        searchInput.oninput = (e) => {
          AppState.filters.search = e.target.value;
          renderApp();
        };
      }
      const villageSelect = document.getElementById("filter-village");
      if (villageSelect) {
        villageSelect.onchange = (e) => {
          AppState.filters.village = e.target.value;
          renderApp();
        };
      }
      const qualitySelect = document.getElementById("filter-quality");
      if (qualitySelect) {
        qualitySelect.onchange = (e) => {
          AppState.filters.quality = e.target.value;
          renderApp();
        };
      }
    };

    // -----------------------
    // Initialize App
    // -----------------------
    const bootstrap = () => {
      if (AppState.initDone) return;
      AppState.initDone = true;
      const existingSession = getSession();
      if (existingSession) {
        AppState.auth = existingSession;
        showToast(t("sessionRestored"), "info");
      }
      renderApp();
    };

    document.addEventListener("DOMContentLoaded", bootstrap);
  </script>
</body>
</html>
