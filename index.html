<!DOCTYPE html>
<html>
<head>
  <title>FarmPulse</title>
</head>
<body>

<h1>🌾 FarmPulse</h1>

<!-- LOGIN -->
<h2>Login</h2>
<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Password"><br><br>
<button onclick="login()">Login</button>

<hr>

<!-- ADD CROP -->
<h2>Add Crop</h2>
<input id="name" placeholder="Crop Name"><br><br>
<input id="price" placeholder="Price"><br><br>
<input id="quantity" placeholder="Quantity"><br><br>
<input id="village" placeholder="Village"><br><br>
<input id="contact" placeholder="Contact"><br><br>
<button onclick="addCrop()">Add Crop</button>

<hr>

<!-- CROPS LIST -->
<h2>All Crops</h2>
<button onclick="loadCrops()">Refresh</button>
<ul id="crops"></ul>

<script>

const API_URL = "http://localhost:5000";

// 🔐 LOGIN
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch(`${API_URL}/api/auth/login`, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();

  if (res.ok) {
    alert("Login Success");
    localStorage.setItem("token", data.token);
  } else {
    alert("Login Failed");
  }
}

// 🌾 ADD CROP
async function addCrop() {
  const name = document.getElementById("name").value;
  const price = document.getElementById("price").value;
  const quantity = document.getElementById("quantity").value;
  const village = document.getElementById("village").value;
  const contact = document.getElementById("contact").value;

  const token = localStorage.getItem("token");

  const res = await fetch(`${API_URL}/api/crops`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": token
    },
    body: JSON.stringify({ name, price, quantity, village, contact })
  });

  if (res.ok) {
    alert("Crop Added");
    loadCrops();
  } else {
    alert("Error adding crop");
  }
}

// 📄 LOAD CROPS
async function loadCrops() {
  const res = await fetch(`${API_URL}/api/crops`);
  const data = await res.json();

  const list = document.getElementById("crops");
  list.innerHTML = "";

  data.forEach(crop => {
    const li = document.createElement("li");
    li.innerText = `${crop.name} - ₹${crop.price} - ${crop.quantity}kg - ${crop.village}`;
    list.appendChild(li);
  });
}

// AUTO LOAD
loadCrops();

</script>

</body>
</html>
